        m2_p1: "W5-W9 專注於將商管問題轉化為可驗證的數據假說 (Hypothesis)。我們將學習任務拆解技巧 (Epic → User Story → Task)，並利用 AI 輔助生成 WBS (工作分解結構)。",
        m2_p2: "接著，我們導入 ORID (焦點討論法) 架構引導 AI 產出深度洞察：從 Objective (客觀數據) 出發，經過 Reflective 與 Interpretive，最終推導出 Decisional (策略)。",
        m2_p3: "最精彩的實作是「Agent Debate (代理人辯論)」。學生提出假說，由正方 Agent 找支持數據，反方 Agent 找反對數據。PM 將依據雙方結構化報告的證據強度，撰寫判定理由並決定假說是否成立。",
        m2_terms: [
          { front: "ORID", back: "焦點討論法。依序透過 Objective(客觀)、Reflective(直覺)、Interpretive(詮釋)、Decisional(決定) 四層次進行深度反思與決策的架構。" },
          { front: "Hypothesis Testing", back: "假說檢定。在商業分析中，透過數據與 Agent 辯論，驗證某項商業直覺（如通膨對成本的影響）是否成立的過程。" },
          { front: "WBS", back: "Work Breakdown Structure（工作分解結構）。將複雜的專案目標，逐層拆解為可管理的小任務的系統化方法。" },
          { front: "Agent Debate", back: "代理人辯論。指派正方與反方 AI Agent 各自蒐集數據進行攻防，協助 PM 以多元視角驗證假說強健度。" }
        ],
        m2_q: [
          { q: "ORID 架構中的 'I' 代表什麼意義？", opts: ["Idea (想法)", "Input (輸入)", "Interpretive (詮釋意義)", "Investment (投資)"], ans: 2, exp: "ORID 的 I 為 Interpretive，代表針對客觀數據與直覺反應後，進行商業模式與意義上的深度詮釋。" },
          { q: "在「Agent Debate (代理人辯論)」實作中，PM 的主要職責是什麼？", opts: ["親自撰寫爬蟲程式找數據", "擔任正方 Agent", "綜合雙方證據強度，撰寫判定理由並決定假說是否成立", "只負責報告排版"], ans: 2, exp: "PM 是決策者，需依據正反雙方 Agent 提出的結構化報告，進行最終裁決與理由論述。" },
          { q: "任務拆解的層級順序為何？", opts: ["Task → Story → Epic", "Epic → User Story → Task", "Feature → Bug → Fix", "Sprint → Standup → Review"], ans: 1, exp: "正確的拆解層級為 Epic（大史詩）→ User Story（使用者故事）→ Task（最小可執行單位）。" },
          { q: "W8 期中驗收包含哪項重要的團隊管理活動？", opts: ["期末部署上線", "第一次匿名同儕互評", "AI Pipeline 壓力測試", "DataCamp 結業考試"], ans: 1, exp: "W8 除了 Lightning Talk 展演外，還包含第一次匿名同儕互評，評估各成員的職能貢獻度。" }
        ],

        // M3
        m3_title: "🤖 3. Phase 3: 自動化與 Agentic AI 實戰",
        m3_p1: "W10-W15 我們進入 AI 協作開發環境 (IDE, 如 Cursor)。您不需從零撰寫程式，而是學習「閱讀程式碼」，並指揮 AI 產出 PyScript 網頁雛形。",
        m3_p2: "我們將導入多代理人拓撲學 (Multi-Agent Topology)，定義各 AI 角色的資訊傳遞關係，並賦予 Agent 串接公開 API (Skills & Tool Use) 的能力。同時，為防範 AI 幻覺，必須在決策節點加入 Human-in-the-loop (人類介入) 機制。",
        m3_p3: "最終，我們將打造出會思考的迴圈：Data Agent 抓資料 → Analyst Agent 邏輯推理 → Critic Agent 壓力測試。並透過 Tailwind CSS 美化介面，完成 GitHub Pages 部署。",
        m3_terms: [
          { front: "Human-in-the-loop", back: "人類介入機制。在 AI 自動化流程中保留關鍵的核准節點，由人類 PM 把關，以防範 AI 幻覺與決策風險。" },
          { front: "Multi-Agent Topology", back: "多代理人拓撲學。定義專案中多個專職 AI 角色（如數據、分析、審查）之間的工作流與資訊傳遞架構。" },
          { front: "MCP / Tool Use", back: "Model Context Protocol / 工具使用。賦予 AI Agent 串接外部 API 的能力，讓它能實際抓取數據、操作工具，而非只靠訓練資料回答。" },
          { front: "Chain of Thought", back: "思維鏈。引導 AI 一步步寫下推理過程的技術，能大幅提升複雜商業邏輯推演的準確度。" }
        ],
        m3_q: [
          { q: "在自動化決策流程中加入 Human-in-the-loop 的主要目的是什麼？", opts: ["增加伺服器負載", "防範 AI 幻覺與偏見，確保商業策略的安全性", "讓網頁看起來更酷", "減緩資料抓取速度"], ans: 1, exp: "人類介入機制是 AI 風險控管的核心，確保最終的商業策略經過人類 PM 的安全把關。" },
          { q: "本課程推薦用來進行 AI 協作開發的 IDE 工具首選為何？", opts: ["Eclipse", "Sublime Text", "Cursor", "Notepad"], ans: 2, exp: "課程推薦 Cursor (或 VS Code + AI 擴充) 作為 AI 協作開發環境，讓學生能用語意直接生成與修改程式碼。" },
          { q: "Multi-Agent Pipeline 的正確資料流向順序為何？", opts: ["Critic → Analyst → Data", "Data Agent → Analyst Agent → Critic Agent", "PM → Data → Deploy", "UI → API → Database"], ans: 1, exp: "正確流程為 Data Agent 抓取資料 → Analyst Agent 進行推理 → Critic Agent 進行壓力測試。" },
          { q: "W15 期末前的最後一週主要做什麼？", opts: ["重新定義商業問題", "UI/UX 美化、GitHub Pages 部署與全英文簡報彩排", "學習 Python 進階語法", "撰寫學術論文"], ans: 1, exp: "W15 重點是產品包裝（Tailwind CSS 美化）、零成本部署與期末全英文簡報彩排。" }
        ],

        m4_log_3: "[Critic Agent] 紅軍審查。警告：雖成本上升，但若延緩擴廠，競爭對手可能搶佔市佔率。此假說存在戰略盲點！",

          { title: "🕵️‍♂️ 數據架構師", desc: "尋找可靠數據源 (如 FRED API)，指揮 Data Agent 撰寫「資料獲取與清洗」程式碼。" },

          { q: "DataCamp 在本課程中的主要定位是什麼？", opts: ["訓練學生具備獨立開發大型軟體的能力", "取代所有實體課堂", "建立溝通語彙 (Vocabulary Building)，讓學生看懂程式碼以精準指揮 AI", "用來考試算成績"], ans: 2, exp: "DataCamp 的目的是讓無程式背景的學生具備基礎的 Technical Vocab，從而能寫出更專業的 Prompt 規格書。" },

    // --- Component: Quiz Module ---
    const ModuleQuiz = ({ questions, t, moduleId, onQuizSubmit }) => {
      const [selectedIndices, setSelectedIndices] = useState([]);
      const [answers, setAnswers] = useState({0: null, 1: null, 2: null});
      const [submitted, setSubmitted] = useState(false);

      const initQuiz = () => {
        if (!questions || questions.length === 0) return;
        const indices = questions.map((_, i) => i).sort(() => 0.5 - Math.random()).slice(0, Math.min(3, questions.length));
        setSelectedIndices(indices);
        const a = {}; indices.forEach((_, i) => a[i] = null); setAnswers(a);
        setSubmitted(false);
      };

      useEffect(() => {
        initQuiz();
      }, [moduleId]);

      if (selectedIndices.length === 0) return null;
      
      const score = Object.keys(answers).filter(k => {
        const qIdx = selectedIndices[k];
        return answers[k] === questions[qIdx]?.ans;
      }).length;

      const handleSubmit = () => {
        setSubmitted(true);
        if (onQuizSubmit) {
          onQuizSubmit(moduleId, score, selectedIndices.length); 
        }
      };

      return (
        <div className="mt-12 bg-white dark:bg-slate-800 p-6 md:p-8 rounded-2xl shadow-sm border-t-4 border-brand-primary transition-colors">
          <h3 className="text-xl font-serif font-bold mb-6 text-brand-primary dark:text-brand-secondary flex items-center">
            <IconCheckCircle className="mr-2" size={20}/> {t.quiz_title}
          </h3>
          <div className="space-y-8">
            {selectedIndices.map((qIdxOrigin, uiIdx) => {
              const q = questions[qIdxOrigin];
              if (!q) return null;
              return (
                <div key={uiIdx} className="bg-slate-50 dark:bg-slate-700/50 p-5 rounded-xl border border-slate-200 dark:border-slate-600">
                  <h4 className="text-base font-semibold mb-4 text-slate-800 dark:text-slate-100">{uiIdx + 1}. {q.q}</h4>
                  <div className="space-y-2">
                    {q.opts.map((opt, oIdx) => {
                      const isSelected = answers[uiIdx] === oIdx;
                      const isCorrect = oIdx === q.ans;
                      let btnClass = "w-full text-left p-3 rounded-lg border transition-all text-sm ";
                      
                      if (!submitted) {
                        btnClass += isSelected ? "bg-brand-primary text-white border-brand-primary" : "bg-white dark:bg-slate-800 text-slate-700 dark:text-slate-300 border-slate-300 dark:border-slate-600 hover:border-brand-primary hover:bg-slate-50 dark:hover:bg-slate-700";
                      } else {
                        if (isCorrect) btnClass += "bg-emerald-100 dark:bg-emerald-900/40 border-emerald-500 font-bold text-emerald-900 dark:text-emerald-100";
                        else if (isSelected && !isCorrect) btnClass += "bg-rose-100 dark:bg-rose-900/40 border-rose-500 text-rose-900 dark:text-rose-100 line-through opacity-70";
                        else btnClass += "bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-600 opacity-50 text-slate-500 dark:text-slate-400";
                      }

                      return (
                        <button key={oIdx} onClick={() => !submitted && setAnswers({...answers, [uiIdx]: oIdx})} className={btnClass} disabled={submitted}>
                          {opt}
                        </button>
                      );
                    })}
                  </div>
                  {submitted && (
                    <div className={`mt-4 p-4 rounded-lg text-sm flex items-start ${answers[uiIdx] === q.ans ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-800 dark:text-emerald-200' : 'bg-rose-50 dark:bg-rose-900/20 text-rose-800 dark:text-rose-200'}`}>
                      <div className="mr-2 mt-0.5">
                        {answers[uiIdx] === q.ans ? <IconCheckCircle size={16}/> : <IconAlertTriangle size={16}/>}
                      </div>
                      <div><strong>{t.explanation}:</strong> {q.exp}</div>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div className="mt-8 pt-6 border-t border-slate-200 dark:border-slate-700 flex flex-col sm:flex-row justify-between items-center gap-4">
            {!submitted ? (
              <button 
                onClick={handleSubmit}
                disabled={Object.values(answers).includes(null)}
                className="w-full sm:w-auto px-8 py-3 bg-brand-primary text-white font-bold rounded-lg hover:bg-blue-800 disabled:opacity-50 transition-colors"
              >
                {t.submit}
              </button>
            ) : (
              <>
                <div className="text-xl font-serif font-bold text-brand-primary dark:text-brand-secondary">
                  {t.score}: {score} / {selectedIndices.length}
                </div>
                <button 
                  onClick={initQuiz}
                  className="w-full sm:w-auto px-6 py-2 bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-slate-200 font-medium rounded-lg hover:bg-slate-300 dark:hover:bg-slate-600 transition-colors"
                >
                  {t.retry}
                </button>
              </>
            )}
          </div>
        </div>
      );
    };

          </div>

          {/* Controls */}
          <div className="flex justify-center gap-4">
            {step === 0 && (
              <button onClick={nextStep} className="bg-brand-primary hover:bg-blue-600 text-white px-6 py-2 rounded-lg font-bold flex items-center transition">
                <IconPlay size={18} className="mr-2"/> {t.m4_run_btn}
              </button>
            )}
            {step > 0 && step < 4 && step !== 6 && (
              <button onClick={nextStep} className="bg-slate-700 hover:bg-slate-600 text-white px-6 py-2 rounded-lg font-medium transition">
                Next Process ...
              </button>
            )}
            {step === 4 && (
              <>
                <button onClick={nextStep} className="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-bold transition flex items-center">
                  <IconCheckCircle size={18} className="mr-2"/> {t.m4_approve}

                  <IconX size={18} className="mr-2"/> {t.m4_reject}
                </button>
              </>
            )}
            {(step === 5 || step === 6) && (
              <button onClick={reset} className="bg-slate-700 hover:bg-slate-600 text-white px-6 py-2 rounded-lg font-medium transition flex items-center">
                <IconShuffle size={18} className="mr-2"/> Reset Pipeline
              </button>
            )}
          </div>
        </div>
      );
    }

          const row = [dateStr, timeStr, studentInfo.group, studentInfo.dept, studentInfo.id, studentInfo.name, moduleTitle, time, clicks, correct, answered, totalQ, acc].join(",");
          csvContent += row + "\n";
        });
        
        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `BAPM_Analytics_${studentInfo.id}_${now.getTime()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      useEffect(() => {
        if (isDark) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [isDark]);

      const handleTTS = (action) => {
        if (!('speechSynthesis' in window)) return;
        if (action === 'stop') {
          window.speechSynthesis.cancel();
          setTtsState('idle');
          return;
        }
        if (action === 'pause') {
          window.speechSynthesis.pause();
          setTtsState('paused');
          return;
        }
        if (action === 'play') {
          if (ttsState === 'paused') {
            window.speechSynthesis.resume();
            setTtsState('playing');
            return;
          }
          window.speechSynthesis.cancel();
          
          let textToRead = "";
          // Helper function to remove emoji at the start of a string
          const removeEmoji = (str) => {
            return str.replace(/^[\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF]/g, '').trim();
          };

          // Read all visible text from the current page (including sub-tabs)
          if (contentRef.current) {
            textToRead = contentRef.current.innerText.substring(0, 3000);
            textToRead = removeEmoji(textToRead);
          } else if (module < 7) {
            const textSources = [
              [t.m0_title, t.m0_p1, t.m0_p2, t.m0_p3],
              [t.m1_title, t.m1_p1, t.m1_p2, t.m1_p3],
              [t.m2_title, t.m2_p1, t.m2_p2, t.m2_p3],
              [t.m3_title, t.m3_p1, t.m3_p2, t.m3_p3],
              [t.m4_title, t.m4_p1],
              [t.m5_title, t.m5_p1, t.m5_roles.map(r=>r.title + r.desc).join(" ")],
              [t.m6_title, t.m6_p1, t.m6_setup, t.m6_setup_list.join(" "), t.m6_datacamp],
            ];
            textToRead = textSources[module].map(removeEmoji).join('。 ');
          } else {
            textToRead = removeEmoji(t.analytics_title) + "。 " + t.analytics_desc;
          }

          const utterance = new SpeechSynthesisUtterance(textToRead);
          utterance.rate = 0.95; 
          const voices = window.speechSynthesis.getVoices();
          if (lang === 'zh') {
            const twVoice = voices.find(v => v.lang.includes('zh-TW') && (v.name.includes('Yating') || v.name.includes('Han'))) || voices.find(v => v.lang.includes('zh'));
            if (twVoice) utterance.voice = twVoice;
          } else {
            const ukVoice = voices.find(v => v.lang.includes('en-GB') && (v.name.includes('Male') || v.name.includes('Daniel'))) || voices.find(v => v.lang.includes('en-GB')) || voices.find(v => v.lang.includes('en'));
            if (ukVoice) utterance.voice = ukVoice;
          }
          utterance.onend = () => setTtsState('idle');
          window.speechSynthesis.speak(utterance);
          setTtsState('playing');
        }
      };

      useEffect(() => { handleTTS('stop'); }, [module, lang]);
      useEffect(() => {
        if ('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged = () => {}; 
        return () => { if ('speechSynthesis' in window) window.speechSynthesis.cancel(); };
      }, []);

                  <h3 className="text-lg font-bold uppercase tracking-wider text-slate-500 mb-4">{t.key_terms}</h3>
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    {t.m6_terms.map((term, i) => <FlipCard key={i} front={term.front} back={term.back} t={t} />)}
                  </div>
                </div>
                <ModuleQuiz questions={t.m6_q} t={t} moduleId={module} onQuizSubmit={handleQuizSubmit} />
              </div>
            );
          case 7:
            return renderAnalyticsDashboard();
          default:
            return null;
        }
      };

      return (
        <div className={`min-h-screen bg-slate-50 dark:bg-slate-900 font-sans selection:bg-brand-primary selection:text-white dark:selection:bg-brand-secondary dark:selection:text-slate-900 transition-colors duration-300 ${isDark ? 'dark' : ''}`}>
          
          {menuOpen && (
            <div className="fixed inset-0 bg-black/40 z-40 transition-opacity" onClick={() => setMenuOpen(false)} />
          )}

          {/* Header */}
          <header className="bg-white dark:bg-brand-dark text-slate-800 dark:text-white sticky top-0 z-50 shadow-sm border-b border-slate-200 dark:border-slate-800 transition-colors h-16">
            <div className="max-w-7xl mx-auto px-4 h-full flex items-center justify-between">
              <div className="flex items-center space-x-4">
                <button className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-md transition-colors relative z-50" onClick={() => setMenuOpen(!menuOpen)}>
                  {menuOpen ? <IconX size={24} /> : <IconMenu size={24} />}
                </button>
                <div className="cursor-pointer group flex items-center" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}>
                  <div className="w-8 h-8 bg-brand-primary dark:bg-brand-secondary flex items-center justify-center text-white dark:text-brand-dark font-serif font-bold text-xl mr-3 group-hover:opacity-90 transition-opacity">
                    B
                  </div>
                  <div className="hidden sm:block">
                    <h1 className="text-lg font-serif font-bold leading-tight tracking-tight text-brand-primary dark:text-white group-hover:opacity-80 transition-colors">{t.title}</h1>
                  </div>
                </div>
              </div>
              
              <div className="flex items-center space-x-2 md:space-x-4">
                <div className="hidden sm:flex items-center bg-slate-100 dark:bg-slate-800 rounded-full px-2 py-1 mr-2 border border-slate-200 dark:border-slate-700">
                  <span className="text-xs font-bold uppercase mr-2 ml-2 opacity-50">{t.audio_read}</span>
                  {ttsState !== 'playing' ? (
                    <button onClick={() => handleTTS('play')} className="p-1.5 hover:bg-white dark:hover:bg-slate-700 rounded-full text-brand-primary dark:text-brand-secondary transition"><IconPlay size={16} fill="currentColor"/></button>
                  ) : (
                    <button onClick={() => handleTTS('pause')} className="p-1.5 hover:bg-white dark:hover:bg-slate-700 rounded-full text-brand-primary dark:text-brand-secondary transition"><IconPause size={16} fill="currentColor"/></button>
                  )}
                  <button onClick={() => handleTTS('stop')} className="p-1.5 hover:bg-white dark:hover:bg-slate-700 rounded-full text-slate-500 transition"><IconSquare size={16} fill="currentColor"/></button>
                </div>

                <button onClick={() => setIsDark(!isDark)} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors text-slate-600 dark:text-slate-300">
                  {isDark ? <IconSun size={20} /> : <IconMoon size={20} />}
                </button>

                <button onClick={() => setLang(lang === 'zh' ? 'en' : 'zh')} className="flex items-center bg-white dark:bg-slate-800 hover:bg-slate-50 dark:hover:bg-slate-700 px-3 py-1.5 rounded-full text-sm font-bold transition-colors border border-slate-300 dark:border-slate-600 shadow-sm">
                  <IconGlobe size={16} className="mr-2 text-brand-primary dark:text-brand-secondary" />
                  {lang === 'zh' ? 'EN' : '中文'}
                </button>
              </div>
            </div>
            <div className="h-1 bg-slate-100 dark:bg-slate-800 w-full absolute bottom-0 left-0">
              <div className="h-full bg-brand-primary dark:bg-brand-secondary transition-all duration-500 ease-out" style={{ width: `${(module / 7) * 100}%` }}></div>
            </div>
          </header>

          {/* Main Content Layout */}
          <div className="max-w-7xl mx-auto px-4 py-8 relative flex flex-col md:flex-row gap-8 min-h-[calc(100vh-6rem)]">
            
            {/* Floating Dropdown Navigation */}
            <div className="fixed inset-x-0 top-20 z-50 pointer-events-none px-4 flex justify-center">
              <div className="w-full max-w-7xl relative">
                <div className={`absolute top-0 left-0 pointer-events-auto w-full sm:w-80 bg-white dark:bg-brand-dark rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 transition-all duration-300 ease-in-out origin-top overflow-hidden ${menuOpen ? 'opacity-100 scale-y-100 max-h-[80vh]' : 'opacity-0 scale-y-0 max-h-0 border-transparent'}`}>
                  <div className="p-5 bg-slate-50 dark:bg-slate-800/50 border-b border-slate-100 dark:border-slate-800 font-serif font-bold text-brand-primary dark:text-brand-secondary tracking-widest uppercase text-sm flex justify-between items-center">
                    {t.nav_modules}
                    <button className="text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors" onClick={() => setMenuOpen(false)}><IconX size={20}/></button>
                  </div>
                  <nav className="flex flex-col py-2 overflow-y-auto max-h-[calc(80vh-4rem)]">
                    {modulesList.map((m) => (
                      <button key={m.id} onClick={() => { setModule(m.id); setMenuOpen(false); }} className={`flex items-center w-full text-left px-5 py-4 text-sm font-medium transition-colors border-l-4 ${module === m.id ? 'bg-slate-50 dark:bg-slate-800 border-brand-primary dark:border-brand-secondary text-brand-primary dark:text-white font-bold' : 'border-transparent text-slate-600 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 hover:text-slate-900 dark:hover:text-slate-200'}`}>
                        <span className={`mr-3 ${module === m.id ? 'text-brand-primary dark:text-brand-secondary' : 'opacity-50'}`}>{m.icon}</span>
                        {m.title}
                        {module === m.id && <IconChevronRight size={16} className="ml-auto opacity-50" />}
                      </button>
                    ))}
                  </nav>
                </div>
              </div>
            </div>

            {/* Main Content Area */}
            <main className="flex-1 min-w-0 pb-16 transition-all duration-300" onClick={handleMainClick}>
              <div className="sm:hidden flex items-center bg-white dark:bg-slate-800 rounded-full px-4 py-2 mb-6 shadow-sm border border-slate-200 dark:border-slate-700 justify-between">
                 <span className="text-sm font-bold text-slate-600 dark:text-slate-300 flex items-center"><IconGlobe size={16} className="mr-2"/> {t.audio_read}</span>
                 <div className="flex space-x-2">
                  {ttsState !== 'playing' ? (
                    <button onClick={() => handleTTS('play')} className="p-2 bg-brand-light dark:bg-brand-secondary/10 rounded-full text-brand-primary dark:text-brand-secondary"><IconPlay size={16} fill="currentColor"/></button>
                  ) : (
                    <button onClick={() => handleTTS('pause')} className="p-2 bg-brand-light dark:bg-brand-secondary/10 rounded-full text-brand-primary dark:text-brand-secondary"><IconPause size={16} fill="currentColor"/></button>
                  )}
                  <button onClick={() => handleTTS('stop')} className="p-2 bg-slate-100 dark:bg-slate-700 rounded-full text-slate-600 dark:text-slate-300"><IconSquare size={16} fill="currentColor"/></button>
                 </div>
              </div>

              <div ref={contentRef} className="scroll-mt-24">
                {renderModuleContent()}
              </div>
              
              <div className="mt-12 flex justify-between items-center pt-8 border-t border-slate-300 dark:border-slate-700">
                <button onClick={() => setModule(Math.max(0, module - 1))} disabled={module === 0} className="px-6 py-3 rounded-none font-serif font-bold text-slate-500 dark:text-slate-400 hover:text-brand-primary dark:hover:text-brand-secondary disabled:opacity-0 transition-colors flex items-center uppercase text-sm tracking-wider">
                  ← {t.nav_prev}
                </button>
                <button onClick={() => setModule(Math.min(7, module + 1))} disabled={module === 7} className="px-8 py-3 bg-brand-primary dark:bg-brand-secondary text-white dark:text-slate-900 font-serif font-bold hover:opacity-90 disabled:opacity-0 transition-opacity flex items-center uppercase text-sm tracking-wider shadow-md rounded-lg">
                  {t.nav_next} <IconArrowRight size={16} className="ml-2" />
                </button>
              </div>
            </main>
          </div>

          {/* Footer */}
          <footer className="bg-brand-dark text-slate-400 border-t border-slate-800">
            <div className="max-w-7xl mx-auto px-4 h-10 flex justify-between items-center text-[10px] sm:text-xs">
              <div className="flex items-center space-x-2 md:space-x-4">
                <div className="font-serif font-bold text-brand-secondary hidden sm:block">BAPM</div>
                <span className="truncate">{t.copyright} {t.date}</span>
              </div>
              
              <div className="flex items-center space-x-3 md:space-x-4">
                <a href="https://www.ibs.ncnu.edu.tw/index.php/faculty/tenured-professor/299-smlo" target="_blank" rel="noopener noreferrer" className="text-brand-secondary hover:text-white font-serif border-b border-transparent hover:border-brand-secondary transition-all truncate">
                  {t.architect}
                </a>
                <button onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className="flex items-center uppercase tracking-widest hover:text-white transition-colors border-l border-slate-700 pl-3">
                  <IconChevronUp size={12} className="md:mr-1" /> <span className="hidden sm:inline">TOP</span>
                </button>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
